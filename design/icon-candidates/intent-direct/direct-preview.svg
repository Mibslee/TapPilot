<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500">
  <rect width="980" height="500" rx="30" fill="#F5F5F7"/>
  <text x="48" y="58" font-family="-apple-system,'PingFang SC',sans-serif" font-size="26" font-weight="700" fill="#202124">Mac 顶栏单色标识 · 原意向图直接提取</text>
  <text x="48" y="91" font-family="-apple-system,'PingFang SC',sans-serif" font-size="16" fill="#707278">不重画手形，只移除圆盘、阴影和背景；macOS 使用透明模板自动适配深浅模式</text>
  <g transform="translate(48 126)">
    <rect width="262" height="320" rx="20" fill="#fff"/>
    <text x="22" y="38" font-family="-apple-system,'PingFang SC',sans-serif" font-size="16" font-weight="650" fill="#25262A">原始意向图局部</text>
    <image href="source-crop.png" x="31" y="60" width="200" height="200"/>
    <text x="22" y="291" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#777980">保留你提供的电脑、手机</text>
    <text x="22" y="313" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#777980">与完整手指轮廓</text>
  </g>
  <g transform="translate(334 126)">
    <rect width="262" height="320" rx="20" fill="#fff"/>
    <text x="22" y="38" font-family="-apple-system,'PingFang SC',sans-serif" font-size="16" font-weight="650" fill="#25262A">透明模板提取结果</text>
    <image href="menubar-direct.png" x="46" y="68" width="170" height="158"/>
    <text x="22" y="291" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#777980">无白色圆盘、无投影</text>
    <text x="22" y="313" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#777980">手形未重新设计</text>
  </g>
  <g transform="translate(620 126)">
    <rect width="312" height="320" rx="20" fill="#fff"/>
    <text x="22" y="38" font-family="-apple-system,'PingFang SC',sans-serif" font-size="16" font-weight="650" fill="#25262A">顶栏实际尺寸预览</text>
    <rect x="22" y="66" width="268" height="58" rx="12" fill="#ECEDEF"/>
    <text x="40" y="102" font-family="-apple-system,sans-serif" font-size="14" fill="#686A70">Wi-Fi</text>
    <image href="menubar-direct.png" x="113" y="84" width="19" height="18"/>
    <text x="148" y="102" font-family="-apple-system,sans-serif" font-size="14" fill="#202126">TapPilot</text>
    <rect x="22" y="142" width="268" height="58" rx="12" fill="#252527"/>
    <text x="40" y="178" font-family="-apple-system,sans-serif" font-size="14" fill="#D6D6D8">Wi-Fi</text>
    <image href="menubar-direct-white.png" x="113" y="160" width="19" height="18"/>
    <text x="148" y="178" font-family="-apple-system,sans-serif" font-size="14" fill="#F4F4F5">TapPilot</text>
    <text x="22" y="244" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#777980">19×18 px 光学尺寸</text>
    <text x="22" y="269" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#777980">电脑右线被手机自然遮挡</text>
    <text x="22" y="294" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#777980">点击手势来自原图负形</text>
  </g>
</svg>
